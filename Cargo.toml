[workspace]
resolver = "3"

members = ["lex", "lex-data"]

[workspace.dependencies]
anyhow = "1"
clap = { version = "4.6", features = ["derive"] }
strum = { version = "0.26", features = ["derive"] }

[profile.release]
lto = "fat"
opt-level = 3

[profile.samply]
inherits = "release"
debug = true
lto = false
force-frame-pointers = true
